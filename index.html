<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОПиУ — Нобед Букинг</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#F7F6F2; --surface:#FFFFFF; --surface2:#F0EFE9;
    --border:rgba(0,0,0,0.08); --text:#1A1A18; --text2:#6B6A65; --text3:#9E9D97;
    --green:#3B6D11; --green-bg:#EAF3DE;
    --red:#A32D2D; --red-bg:#FCEBEB;
    --blue:#185FA5; --amber:#BA7517; --accent:#D85A30;
    --topbar-h:84px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* ── TOP BAR ── */
  .top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.875rem 1.25rem 0;position:fixed;top:0;left:0;right:0;z-index:100;}
  .top-bar-inner{display:flex;align-items:center;gap:12px;margin-bottom:.5rem;}
  .burger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
  .burger span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px;transition:all .2s;}
  .logo{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;flex:1;}
  .logo em{color:var(--accent);font-style:normal;}
  .sync-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);white-space:nowrap;}
  .dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s;flex-shrink:0;}
  .dot.live{background:#639922;} .dot.loading{background:var(--amber);animation:pulse 1s infinite;} .dot.error{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .month-nav{display:flex;overflow-x:auto;gap:2px;padding-bottom:.75rem;scrollbar-width:none;}
  .month-nav::-webkit-scrollbar{display:none;}
  .month-tab{flex-shrink:0;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:500;color:var(--text3);padding:6px 14px;border-radius:20px;cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap;}
  .month-tab:hover{color:var(--text2);background:var(--surface2);}
  .month-tab.active{background:var(--text);color:var(--bg);}

  /* ── DRAWER ── */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
  .overlay.open{opacity:1;pointer-events:all;}
  .drawer{position:fixed;top:0;left:-280px;width:260px;height:100vh;background:var(--surface);z-index:201;transition:left .25s;padding:1.5rem 1.25rem;display:flex;flex-direction:column;gap:4px;box-shadow:4px 0 20px rgba(0,0,0,.1);}
  .drawer.open{left:0;}
  .drawer-title{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem;margin-top:.5rem;}
  .drawer-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;cursor:pointer;border:none;background:none;font-family:'Golos Text',sans-serif;font-size:15px;font-weight:500;color:var(--text2);width:100%;text-align:left;transition:all .15s;}
  .drawer-item:hover{background:var(--surface2);}
  .drawer-item.active{background:var(--surface2);color:var(--text);}
  .drawer-item .di{font-size:20px;width:32px;text-align:center;}

  /* ── PAGE ── */
  .page{padding-top:var(--topbar-h);}
  .section{display:none;}
  .section.active{display:block;}

  /* ── ОПиУ: MOBILE ── */
  .mobile-hero{padding:1rem 1rem 0;}
  .hero{background:var(--surface);border-radius:20px;padding:1.25rem;border:1px solid var(--border);}
  .hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:1.25rem;}
  .hero-left{flex-shrink:0;}
  .hero-right{flex-shrink:0;text-align:right;}
  .hero-month{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;line-height:1.2;white-space:nowrap;}
  .hero-year{font-family:'Unbounded',sans-serif;font-size:12px;color:var(--amber);margin-top:3px;}
  .hero-amount{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700;line-height:1.2;white-space:nowrap;}
  .hero-amount.pos{color:var(--green);} .hero-amount.neg{color:var(--red);}
  .hero-amount-label{font-size:11px;color:var(--text3);margin-top:3px;}
  .mini-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .mini-stat{background:var(--surface2);border-radius:12px;padding:10px 12px;}
  .mini-stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
  .mini-stat-value{font-size:13px;font-weight:600;white-space:nowrap;}
  .mini-stat-value.pos{color:var(--green);} .mini-stat-value.neg{color:var(--red);}

  .rows-wrap{padding:.75rem 1rem 3rem;}
  .section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:1.25rem 0 .5rem;}
  .row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-radius:14px;padding:12px 14px;margin-bottom:6px;border:1px solid var(--border);transition:border-color .15s;gap:8px;}
  .row:hover{border-color:rgba(0,0,0,.15);}
  .row-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
  .icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .row-info{min-width:0;}
  .row-title{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;}
  .row-sub{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row-right{text-align:right;flex-shrink:0;}
  .row-amount{font-size:14px;font-weight:600;white-space:nowrap;}
  .row-amount.pos{color:var(--green);} .row-amount.neg{color:var(--red);} .row-amount.neg-blue{color:var(--blue);}

  /* ── ОТЧЁТНОСТЬ ── */
  .report-wrap{padding:1rem;}

  /* Toggle годовой/месячный */
  .report-toggle{display:flex;gap:4px;margin-bottom:1rem;background:var(--surface2);border-radius:12px;padding:4px;}
  .toggle-btn{flex:1;padding:7px;border:none;background:none;border-radius:9px;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s;}
  .toggle-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08);}

  /* Chart */
  .chart-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:1rem;margin-bottom:1rem;}
  .chart-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;}
  .chart-wrap{position:relative;height:160px;}

  /* Annual table */
  .annual-table-wrap{background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow-x:auto;}
  .annual-table{border-collapse:collapse;font-size:12px;min-width:100%;}
  .annual-table th{padding:10px 12px;text-align:right;font-weight:600;color:var(--text3);font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--surface);}
  .annual-table th:first-child{text-align:left;position:sticky;left:0;z-index:2;background:var(--surface);}
  .annual-table td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text);}
  .annual-table td:first-child{text-align:left;position:sticky;left:0;background:var(--surface);font-weight:500;z-index:1;}
  .annual-table tr:last-child td{border-bottom:none;}
  .annual-table tr.group-header td{background:var(--surface2);font-weight:600;font-size:12px;}
  .annual-table tr.sub-row td{color:var(--text2);font-size:11px;}
  .annual-table tr.sub-row td:first-child{padding-left:24px;}
  .annual-table tr.highlight td{background:#F0F8EA;}
  .annual-table tr.highlight-red td{background:#FEF3F3;}
  .val-pos{color:var(--green);font-weight:600;}
  .val-neg{color:var(--red);font-weight:600;}
  .val-pct{font-size:10px;color:var(--text3);display:block;}
  .val-pct.up{color:var(--green);} .val-pct.dn{color:var(--red);}
  .total-col{background:var(--surface2) !important;font-weight:600;}

  /* ERROR / SKELETON */
  .error-box{background:#FCEBEB;border:1px solid rgba(163,45,45,.2);border-radius:14px;padding:1.25rem;text-align:center;color:var(--red);font-size:13px;line-height:1.6;margin:1rem;}
  .retry-btn{margin-top:.75rem;background:var(--text);color:var(--bg);border:none;border-radius:10px;padding:8px 18px;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
  .skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;}
  .skeleton-row{height:64px;border-radius:14px;margin-bottom:6px;border:1px solid var(--border);background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* ── DESKTOP ── */
  @media(min-width:900px){
    :root{--topbar-h:84px;}
    .page{display:grid;grid-template-columns:320px 1fr;}

    /* ОПиУ desktop */
    #sec-opiu{display:grid;grid-template-columns:320px 1fr;grid-column:1/-1;}
    #sec-opiu .sidebar-col{position:fixed;top:var(--topbar-h);left:0;width:320px;height:calc(100vh - var(--topbar-h));overflow-y:auto;padding:1.5rem;border-right:1px solid var(--border);background:var(--bg);}
    #sec-opiu .main-col{margin-left:320px;padding:1.5rem;max-width:680px;}
    .mobile-hero{display:none;}
    .rows-wrap{display:none;}
    .sidebar-col,.main-col{display:block;}
    .hero{margin-bottom:0;}
    .hero-month{font-size:24px;} .hero-amount{font-size:22px;}
    .mini-stat-value{font-size:15px;}
    .row{padding:14px 18px;border-radius:16px;}
    .row-title{font-size:15px;} .row-amount{font-size:16px;}
    .icon{width:42px;height:42px;font-size:20px;border-radius:13px;}
    .section-title{font-size:12px;margin:1.5rem 0 .75rem;}

    /* Отчётность desktop */
    #sec-report{grid-column:1/-1;}
    .report-wrap{max-width:1100px;margin:0 auto;padding:1.5rem;}
    .chart-wrap{height:220px;}
    .annual-table{font-size:13px;}
    .annual-table th,.annual-table td{padding:10px 14px;}
  }
  @media(max-width:899px){
    .sidebar-col,.main-col{display:none;}
  }
</style>
</head>
<body>

<!-- DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title">Разделы</div>
  <button class="drawer-item active" id="di-opiu" onclick="switchSection('opiu')">
    <span class="di">📊</span> ОПиУ
  </button>
  <button class="drawer-item" id="di-report" onclick="switchSection('report')">
    <span class="di">📈</span> Отчётность
  </button>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-inner">
    <button class="burger" id="burger" onclick="toggleDrawer()">
      <span></span><span></span><span></span>
    </button>
    <div class="logo">Нобед <em>Букинг</em></div>
    <div class="sync-indicator">
      <div class="dot loading" id="dot"></div>
      <span id="sync-text">Загрузка...</span>
    </div>
  </div>
  <div class="month-nav" id="month-nav"></div>
</div>

<!-- PAGE -->
<div class="page" id="page">

  <!-- ОПиУ -->
  <div class="section active" id="sec-opiu">
    <div class="mobile-hero" id="mobile-hero">
      <div class="hero"><div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:1.25rem"><div><div class="skeleton" style="width:90px;height:20px;margin-bottom:6px"></div><div class="skeleton" style="width:50px;height:13px"></div></div><div style="text-align:right"><div class="skeleton" style="width:130px;height:20px;margin-bottom:6px;margin-left:auto"></div><div class="skeleton" style="width:75px;height:11px;margin-left:auto"></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="skeleton" style="height:52px;border-radius:12px"></div><div class="skeleton" style="height:52px;border-radius:12px"></div></div></div>
    </div>
    <div class="rows-wrap" id="mobile-rows"><div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div></div>
    <div class="sidebar-col" id="sidebar-col"></div>
    <div class="main-col" id="main-col"></div>
  </div>

  <!-- ОТЧЁТНОСТЬ -->
  <div class="section" id="sec-report">
    <div class="report-wrap">
      <div class="report-toggle">
        <button class="toggle-btn active" id="tog-annual" onclick="setReportMode('annual')">Годовой</button>
        <button class="toggle-btn" id="tog-monthly" onclick="setReportMode('monthly')">Месячный</button>
      </div>
      <div class="chart-card">
        <div class="chart-title">Выручка / Прибыль / Расходы</div>
        <div class="chart-wrap"><canvas id="chart"></canvas></div>
      </div>
      <div class="annual-table-wrap">
        <table class="annual-table" id="report-table"></table>
      </div>
    </div>
  </div>

</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQZwm8zj9kaBFZCw7Ite6Xz2ZcBCIp8dC_zwbXTCI65I9EOFGAQAZa8R_6SKRvfEOI6iYukZqfR34vb/pub?gid=678223172&single=true&output=csv';

const MONTHS_MAP={'Январь':0,'Февраль':1,'Март':2,'Апрель':3,'Май':4,'Июнь':5,'Июль':6,'Август':7,'Сентябрь':8,'Октябрь':9,'Ноябрь':10,'Декабрь':11};
const MONTHS_SHORT=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];

let allData=[], cur=0, reportMode='annual', chartInst=null;

/* ── DRAWER ── */
function toggleDrawer(){
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function switchSection(id){
  closeDrawer();
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.querySelectorAll('.drawer-item').forEach(d=>d.classList.remove('active'));
  document.getElementById('di-'+id).classList.add('active');
  // Show/hide month nav
  document.getElementById('month-nav').style.display = id==='opiu' ? 'flex' : 'none';
  if(id==='report' && allData.length) renderReport();
}

/* ── PARSE ── */
function fmt(n,compact){
  if(compact){
    const a=Math.abs(n);
    if(a>=1000000) return (n/1000000).toLocaleString('ru-RU',{maximumFractionDigits:2})+' М';
    if(a>=1000) return (n/1000).toLocaleString('ru-RU',{maximumFractionDigits:1})+' К';
    return n.toLocaleString('ru-RU',{maximumFractionDigits:0});
  }
  return Math.abs(n).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₽';
}
function parseNum(s){
  if(!s) return 0;
  return parseFloat(s.replace(/\s/g,'').replace(/[^\d,.\-]/g,'').replace(',','.')) || 0;
}
function parseCSV(text){
  return text.split('\n').map(line=>{
    const cols=[];let c='',inQ=false;
    for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){cols.push(c.trim());c='';}else c+=ch;}
    cols.push(c.trim());return cols;
  });
}
function parseSheetData(rows){
  const months=[];
  for(const r of rows){
    const year=(r[0]||'').trim(),month=(r[1]||'').trim();
    if(!year||!month||!(month in MONTHS_MAP)||isNaN(parseInt(year))) continue;
    const net=parseNum(r[6]),rev=parseNum(r[2]),costs=parseNum(r[10]);
    if(!rev&&!net&&!costs) continue;
    months.push({
      name:month,year:parseInt(year),monthIdx:MONTHS_MAP[month],
      revenue:rev, netProfit:net, costsAll:costs,
      grossProfit:parseNum(r[5]),
      showsRev:parseNum(r[3]),merchRev:parseNum(r[4]),
      showsProfit:parseNum(r[7]),finProfit:parseNum(r[8]),merchProfit:parseNum(r[9]),
      salaries:parseNum(r[11]),office:parseNum(r[12]),taxes:parseNum(r[13]),dividends:parseNum(r[14]),
      grossMargin:parseNum(r[15]),netMargin:parseNum(r[16]),
    });
  }
  return months;
}

/* ── ОПиУ ── */
function heroHTML(m){
  const pc=m.netProfit>=0?'pos':'neg',ps=m.netProfit>=0?'+':'−';
  return `<div class="hero">
    <div class="hero-top">
      <div class="hero-left"><div class="hero-month">${m.name}</div><div class="hero-year">${m.year}</div></div>
      <div class="hero-right"><div class="hero-amount ${pc}">${ps} ${fmt(m.netProfit)}</div><div class="hero-amount-label">чистая прибыль</div></div>
    </div>
    <div class="mini-stats">
      <div class="mini-stat"><div class="mini-stat-label">Доходы</div><div class="mini-stat-value pos">+ ${fmt(m.revenue)}</div></div>
      <div class="mini-stat"><div class="mini-stat-label">Расходы</div><div class="mini-stat-value neg">− ${fmt(m.costsAll)}</div></div>
    </div>
  </div>`;
}
function rowsHTML(m){
  const income=[
    {icon:'🎭',name:'Концерты',sub:'Прибыль по мероприятиям',amount:m.showsProfit,bg:'#EAF3DE'},
    {icon:'🏛️',name:'Фин.Операции',sub:'Управление финансами',amount:m.finProfit,bg:'#E6F1FB'},
    {icon:'🛒',name:'Магазины',sub:'Прибыль по мерчендайзингу',amount:m.merchProfit,bg:'#FAEEDA'},
  ].filter(c=>c.amount!==0);
  const expenses=[
    {icon:'👔',name:'Зарплаты',sub:'Фонд оплаты труда',amount:m.salaries,bg:'#F1EFE8'},
    {icon:'🏢',name:'Офис и сервисы',sub:'Содержание бизнеса',amount:m.office,bg:'#F1EFE8'},
    {icon:'📮',name:'Налоги',sub:'Вся налоговая нагрузка',amount:m.taxes,bg:'#FCEBEB'},
    {icon:'🧳',name:'Дивиденды',sub:'Див. зарплата + инвестиции',amount:m.dividends,bg:'#E6F1FB'},
  ].filter(c=>c.amount!==0);
  let h=`<div class="section-title">Доходы</div>`;
  income.forEach(c=>{
    const sign=c.amount>=0?'+':'−',cl=c.amount>=0?'pos':'neg';
    h+=`<div class="row"><div class="row-left"><div class="icon" style="background:${c.bg}">${c.icon}</div><div class="row-info"><div class="row-title">${c.name}</div><div class="row-sub">${c.sub}</div></div></div><div class="row-right"><div class="row-amount ${cl}">${sign} ${fmt(c.amount)}</div></div></div>`;
  });
  h+=`<div class="section-title">Расходы</div>`;
  expenses.forEach(c=>{
    const cl=c.name==='Дивиденды'?'neg-blue':'neg';
    h+=`<div class="row"><div class="row-left"><div class="icon" style="background:${c.bg}">${c.icon}</div><div class="row-info"><div class="row-title">${c.name}</div><div class="row-sub">${c.sub}</div></div></div><div class="row-right"><div class="row-amount ${cl}">− ${fmt(Math.abs(c.amount))}</div></div></div>`;
  });
  return h;
}
function renderOPiU(){
  const m=allData[cur];
  document.getElementById('mobile-hero').innerHTML=heroHTML(m);
  document.getElementById('mobile-rows').innerHTML=rowsHTML(m);
  document.getElementById('sidebar-col').innerHTML=heroHTML(m);
  document.getElementById('main-col').innerHTML=rowsHTML(m);
}
function renderNav(){
  document.getElementById('month-nav').innerHTML=allData.map((m,i)=>
    `<button class="month-tab ${i===cur?'active':''}" onclick="sel(${i})">${m.name} ${String(m.year).slice(-2)}</button>`
  ).join('');
  requestAnimationFrame(()=>{
    const a=document.querySelector('.month-tab.active');
    if(a) a.scrollIntoView({inline:'center',block:'nearest'});
  });
}
function sel(i){cur=i;renderNav();renderOPiU();window.scrollTo({top:0,behavior:'smooth'});}

/* ── REPORT ── */
function setReportMode(mode){
  reportMode=mode;
  document.getElementById('tog-annual').classList.toggle('active',mode==='annual');
  document.getElementById('tog-monthly').classList.toggle('active',mode==='monthly');
  renderReport();
}

function groupByYear(){
  const years={};
  for(const m of allData){
    if(!years[m.year]) years[m.year]={year:m.year,revenue:0,showsRev:0,merchRev:0,costsAll:0,salaries:0,office:0,taxes:0,dividends:0,grossProfit:0,netProfit:0,showsProfit:0,finProfit:0,merchProfit:0,months:0};
    const y=years[m.year];
    y.revenue+=m.revenue; y.showsRev+=m.showsRev; y.merchRev+=m.merchRev;
    y.costsAll+=m.costsAll; y.salaries+=m.salaries; y.office+=m.office;
    y.taxes+=m.taxes; y.dividends+=m.dividends;
    y.grossProfit+=m.grossProfit; y.netProfit+=m.netProfit;
    y.showsProfit+=m.showsProfit; y.finProfit+=m.finProfit; y.merchProfit+=m.merchProfit;
    y.months++;
  }
  return Object.values(years).sort((a,b)=>a.year-b.year);
}

function renderReport(){
  if(!allData.length) return;
  const isAnnual=reportMode==='annual';
  const cols=isAnnual?groupByYear():allData;
  renderChart(cols, isAnnual);
  renderTable(cols, isAnnual);
}

function renderChart(cols, isAnnual){
  const labels=cols.map(c=>isAnnual?c.year:`${MONTHS_SHORT[c.monthIdx??0]} ${String(c.year).slice(-2)}`);
  const revData=cols.map(c=>c.revenue);
  const netData=cols.map(c=>c.netProfit);
  const costData=cols.map(c=>c.costsAll);

  if(chartInst) chartInst.destroy();
  const ctx=document.getElementById('chart').getContext('2d');
  chartInst=new Chart(ctx,{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Выручка',data:revData,backgroundColor:'rgba(56,105,168,.7)',borderRadius:4,borderSkipped:false},
        {label:'Чистая прибыль',data:netData,backgroundColor:netData.map(v=>v>=0?'rgba(59,109,17,.7)':'rgba(163,45,45,.7)'),borderRadius:4,borderSkipped:false},
        {label:'Расходы',data:costData.map(v=>-v),backgroundColor:'rgba(186,117,23,.5)',borderRadius:4,borderSkipped:false},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(Math.abs(ctx.raw),true)}`}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10},color:'#9E9D97'}},
        y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:10},color:'#9E9D97',callback:v=>fmt(v,true)}}
      }
    }
  });
}

function M(v){
  if(!v) return '<span style="color:var(--text3)">—</span>';
  const pos=v>=0;
  const cls=pos?'val-pos':'val-neg';
  const sign=pos?'+':'−';
  const a=Math.abs(v);
  let str;
  if(a>=1000000) str=(v/1000000).toLocaleString('ru-RU',{maximumFractionDigits:2})+' М';
  else if(a>=1000) str=(v/1000).toLocaleString('ru-RU',{maximumFractionDigits:1})+' К';
  else str=v.toLocaleString('ru-RU',{maximumFractionDigits:0});
  return `<span class="${cls}">${pos?'':sign} ${str}</span>`;
}
function Pct(v){
  if(!v&&v!==0) return '';
  const cls=v>=0?'up':'dn';
  return `<span class="val-pct ${cls}">${v>=0?'+':''}${v.toLocaleString('ru-RU',{maximumFractionDigits:1})}%</span>`;
}

function renderTable(cols, isAnnual){
  const total={revenue:0,showsRev:0,merchRev:0,costsAll:0,salaries:0,office:0,taxes:0,dividends:0,grossProfit:0,netProfit:0,showsProfit:0,finProfit:0,merchProfit:0};
  for(const c of cols){for(const k of Object.keys(total)) total[k]+=(c[k]||0);}

  const allCols=[...cols,{...total,year:'ИТОГО',name:'ИТОГО',_total:true}];

  const hdrCells=allCols.map((c,i)=>{
    const lbl=isAnnual?c.year:`${MONTHS_SHORT[c.monthIdx??0]}<br>${c.year}`;
    const cls=c._total?'total-col':'';
    return `<th class="${cls}">${lbl}</th>`;
  }).join('');

  function row(label, key, cls='', sub=false, highlight=''){
    const cells=allCols.map((c,i)=>{
      const v=c[key]||0;
      const tcls=(c._total?'total-col ':'')+highlight;
      return `<td class="${tcls}">${M(v)}</td>`;
    }).join('');
    const rowCls=(sub?'sub-row ':'')+(highlight?'highlight'+highlight+' ':'');
    return `<tr class="${cls} ${rowCls}"><td${sub?' style="padding-left:24px"':''}>${label}</td>${cells}</tr>`;
  }

  let html=`<thead><tr><th style="min-width:160px">Показатель</th>${hdrCells}</tr></thead><tbody>`;

  html+=`<tr class="group-header"><td>Выручка / Revenue</td>${allCols.map(c=>`<td class="${c._total?'total-col':''}">${M(c.revenue)}</td>`).join('')}</tr>`;
  html+=row('• Мероприятия','showsRev','sub-row',true);
  html+=row('• Мерчендайзинг','merchRev','sub-row',true);

  html+=`<tr class="group-header"><td>Расходы / Costs</td>${allCols.map(c=>`<td class="${c._total?'total-col':''}">${M(c.costsAll)}</td>`).join('')}</tr>`;
  html+=row('• Сотрудники','salaries','sub-row',true);
  html+=row('• Офис и сервисы','office','sub-row',true);

  html+=`<tr class="group-header"><td>Налоги / Taxes</td>${allCols.map(c=>`<td class="${c._total?'total-col':''}">${M(c.taxes)}</td>`).join('')}</tr>`;
  html+=`<tr class="group-header"><td>Дивиденды / Dividends</td>${allCols.map(c=>`<td class="${c._total?'total-col':''}">${M(c.dividends)}</td>`).join('')}</tr>`;

  html+=`<tr class="group-header highlight"><td>Общ. прибыль / Gross Profit</td>${allCols.map(c=>`<td class="highlight ${c._total?'total-col':''}">${M(c.grossProfit)}</td>`).join('')}</tr>`;
  html+=row('• Мероприятия','showsProfit','sub-row',true);
  html+=row('• Мерчендайзинг','merchProfit','sub-row',true);
  html+=row('• Фин. Операции','finProfit','sub-row',true);

  html+=`<tr class="group-header" style="background:#F0F8EA"><td>Чистая прибыль / NET Profit</td>${allCols.map(c=>{
    const v=c.netProfit||0;
    const bg=v>=0?'#F0F8EA':'#FEF3F3';
    const tcls=c._total?'total-col':'';
    return `<td class="${tcls}" style="background:${bg}">${M(v)}</td>`;
  }).join('')}</tr>`;

  html+=`</tbody>`;
  document.getElementById('report-table').innerHTML=html;
}

/* ── LOAD ── */
async function loadData(){
  const dot=document.getElementById('dot'),syncText=document.getElementById('sync-text');
  dot.className='dot loading'; syncText.textContent='Загрузка...';
  try{
    const resp=await fetch(CSV_URL);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    allData=parseSheetData(parseCSV(await resp.text()));
    if(!allData.length) throw new Error('Нет данных');
    cur=allData.length-1;
    renderNav();
    renderOPiU();
    dot.className='dot live';
    const now=new Date();
    syncText.textContent=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  }catch(e){
    dot.className='dot error'; syncText.textContent='Ошибка';
    const err=`<div class="error-box"><div style="font-weight:600;margin-bottom:6px">Не удалось загрузить данные</div><div>${e.message}</div><button class="retry-btn" onclick="loadData()">Попробовать снова</button></div>`;
    document.getElementById('mobile-rows').innerHTML=err;
    document.getElementById('main-col').innerHTML=err;
  }
}

// Hide month nav on report section initially
document.getElementById('month-nav').style.display='flex';

loadData();
setInterval(loadData,5*60*1000);
</script>
