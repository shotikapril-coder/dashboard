<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОПиУ — Нобед Букинг</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F2; --surface: #FFFFFF; --surface2: #F0EFE9;
    --border: rgba(0,0,0,0.08); --text: #1A1A18; --text2: #6B6A65; --text3: #9E9D97;
    --green: #3B6D11; --red: #A32D2D; --blue: #185FA5; --amber: #BA7517; --accent: #D85A30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Golos Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 520px; margin: 0 auto; padding: 0 0 4rem; }

  .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.25rem 0; position: sticky; top: 0; z-index: 10; }
  .top-bar-inner { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
  .logo { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 600; }
  .logo span { color: var(--accent); }
  .updated { font-size: 11px; color: var(--text3); }

  .month-nav { display: flex; overflow-x: auto; gap: 2px; padding-bottom: 0.75rem; scrollbar-width: none; }
  .month-nav::-webkit-scrollbar { display: none; }
  .month-tab { flex-shrink: 0; font-family: 'Golos Text', sans-serif; font-size: 13px; font-weight: 500; color: var(--text3); padding: 6px 14px; border-radius: 20px; cursor: pointer; border: none; background: none; transition: all 0.15s; }
  .month-tab:hover { color: var(--text2); background: var(--surface2); }
  .month-tab.active { background: var(--text); color: var(--bg); }

  .content { padding: 1.25rem; }

  .hero { background: var(--surface); border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid var(--border); }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
  .hero-month { font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 700; line-height: 1.2; }
  .hero-year { font-family: 'Unbounded', sans-serif; font-size: 13px; color: var(--amber); margin-top: 2px; }
  .hero-amount { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; text-align: right; line-height: 1.2; }
  .hero-amount.pos { color: var(--green); } .hero-amount.neg { color: var(--red); }
  .hero-amount-label { font-size: 11px; color: var(--text3); text-align: right; margin-top: 3px; }

  .mini-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mini-stat { background: var(--surface2); border-radius: 12px; padding: 10px 12px; }
  .mini-stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .mini-stat-value { font-size: 14px; font-weight: 600; }
  .mini-stat-value.pos { color: var(--green); } .mini-stat-value.neg { color: var(--red); }

  .section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin: 1.25rem 0 0.5rem; }

  .row { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-radius: 14px; padding: 12px 14px; margin-bottom: 6px; border: 1px solid var(--border); transition: border-color 0.15s; }
  .row:hover { border-color: rgba(0,0,0,0.15); }
  .row-left { display: flex; align-items: center; gap: 12px; }
  .icon { width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .row-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .row-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .row-right { text-align: right; }
  .row-amount { font-size: 15px; font-weight: 600; }
  .row-amount.pos { color: var(--green); } .row-amount.neg { color: var(--red); } .row-amount.neg-blue { color: var(--blue); }
  .row-detail { font-size: 11px; color: var(--text3); margin-top: 2px; }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="logo">Нобед <span>Букинг</span></div>
      <div class="updated" id="updated"></div>
    </div>
    <div class="month-nav" id="month-nav"></div>
  </div>
  <div class="content" id="content"></div>
</div>

      {icon:'🧳',name:'Дивиденды',sub:'Див. зарплата + инвестиции',amount:0,bg:'#E6F1FB',detail:null},
    ]
  },
];

function fmt(n) {
  return Math.abs(n).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₽';
}

let cur = DATA.length - 1;

function renderNav() {
  document.getElementById('month-nav').innerHTML = DATA.map((m,i) =>
    `<button class="month-tab ${i===cur?'active':''}" onclick="sel(${i})">${m.name}</button>`
  ).join('');
}

function sel(i) { cur=i; renderNav(); render(); }

function render() {
  const m = DATA[cur];
  document.getElementById('updated').textContent = m.name+' '+m.year;
  const pc = m.profit>=0?'pos':'neg';
  const ps = m.profit>=0?'+':'−';
  let h = `<div class="hero">
    <div class="hero-top">
      <div><div class="hero-month">${m.name}</div><div class="hero-year">${m.year}</div></div>
      <div>
        <div class="hero-amount ${pc}">${ps} ${fmt(m.profit)}</div>
        <div class="hero-amount-label">чистая прибыль</div>
      </div>
    </div>
    <div class="mini-stats">
      <div class="mini-stat"><div class="mini-stat-label">Доходы</div><div class="mini-stat-value pos">+ ${fmt(m.incomeTotal)}</div></div>
      <div class="mini-stat"><div class="mini-stat-label">Расходы</div><div class="mini-stat-value neg">− ${fmt(m.expenseTotal)}</div></div>
    </div>
  </div><div class="section-title">Доходы</div>`;

  m.income.forEach(c => {
    h += `<div class="row"><div class="row-left"><div class="icon" style="background:${c.bg}">${c.icon}</div><div><div class="row-title">${c.name}</div><div class="row-sub">${c.sub}</div></div></div><div class="row-right"><div class="row-amount pos">+ ${fmt(c.amount)}</div></div></div>`;
  });

  h += `<div class="section-title">Расходы</div>`;
  m.expenses.forEach(c => {
    if(!c.amount) return;
    const cl = c.name==='Дивиденды'?'neg-blue':'neg';
    h += `<div class="row"><div class="row-left"><div class="icon" style="background:${c.bg}">${c.icon}</div><div><div class="row-title">${c.name}</div><div class="row-sub">${c.sub}</div></div></div><div class="row-right"><div class="row-amount ${cl}">− ${fmt(c.amount)}</div>${c.detail?`<div class="row-detail">${c.detail}</div>`:''}</div></div>`;
  });

  document.getElementById('content').innerHTML = h;
}

renderNav();
render();
</script>
</body>
</html>
