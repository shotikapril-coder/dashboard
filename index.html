<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОПиУ — Нобед Букинг</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F7F6F2;--surf:#fff;--surf2:#F0EFE9;
  --brd:rgba(0,0,0,.07);--brd2:rgba(0,0,0,.18);
  --t1:#1A1A18;--t2:#6B6A65;--t3:#9E9D97;
  --green:#3B6D11;--red:#A32D2D;--blue:#185FA5;
  --amber:#BA7517;--accent:#D85A30;
  --tbh:84px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;}

/* TOPBAR */
.tb{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--surf);border-bottom:1px solid var(--brd);padding:.875rem 1rem 0;}
.tb1{display:flex;align-items:center;gap:10px;margin-bottom:.5rem;}
.logo{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;flex-shrink:0;}
.logo em{color:var(--accent);font-style:normal;}
.segtabs{display:flex;gap:3px;background:var(--surf2);border-radius:20px;padding:3px;flex:1;max-width:260px;margin:0 auto;}
.segtab{flex:1;text-align:center;font-size:12px;font-weight:500;color:var(--t3);padding:5px 6px;border-radius:17px;cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap;font-family:'Golos Text',sans-serif;}
.segtab.on{background:var(--surf);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.sync{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);flex-shrink:0;}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;}
.dot.live{background:#639922;}.dot.spin{background:var(--amber);animation:pulse 1s infinite;}.dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.mnav{display:flex;overflow-x:auto;gap:2px;padding-bottom:.75rem;scrollbar-width:none;}
.mnav::-webkit-scrollbar{display:none;}
.mnav.hide{display:none;}
.mtab{flex-shrink:0;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:500;color:var(--t3);padding:5px 13px;border-radius:20px;cursor:pointer;border:none;background:none;white-space:nowrap;transition:all .15s;}
.mtab:hover{color:var(--t2);background:var(--surf2);}.mtab.on{background:var(--t1);color:var(--bg);}
.burger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.burger i{display:block;width:20px;height:2px;background:var(--t1);border-radius:2px;transition:all .2s;}
.burger.open i:nth-child(1){transform:translateY(7px) rotate(45deg);}
.burger.open i:nth-child(2){opacity:0;}
.burger.open i:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* DRAWER */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s;}
.ov.on{opacity:1;pointer-events:all;}
.dr{position:fixed;top:0;left:-280px;bottom:0;width:260px;background:var(--surf);z-index:301;transition:left .25s cubic-bezier(.4,0,.2,1);padding:2rem 1.25rem 1.5rem;display:flex;flex-direction:column;gap:4px;border-right:1px solid var(--brd);}
.dr.on{left:0;}
.dr-ttl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin:1.75rem 0 .5rem .75rem;}
.dr-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Golos Text',sans-serif;font-size:14px;color:var(--t2);transition:all .15s;}
.dr-item:hover{background:var(--surf2);color:var(--t1);}
.dr-item.on{background:var(--surf2);color:var(--t1);font-weight:600;}
.dr-icon{width:20px;height:20px;flex-shrink:0;opacity:.55;}
.dr-item.on .dr-icon{opacity:1;}

/* PAGE */
.page{padding-top:var(--tbh);}

/* HERO MOBILE */
.hero{background:var(--surf);border-radius:20px;padding:1.25rem;border:1px solid var(--brd);}
.hm-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:1.25rem;}
.hm-month{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;line-height:1.2;white-space:nowrap;}
.hm-year{font-family:'Unbounded',sans-serif;font-size:12px;color:var(--amber);margin-top:3px;}
.hm-amt{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;line-height:1.2;white-space:nowrap;}
.hm-amt.pos{color:var(--green);}.hm-amt.neg{color:var(--red);}
.hm-lbl{font-size:11px;color:var(--t3);margin-top:3px;text-align:right;}

/* HERO DESKTOP — month + year same size, bold */
.hd-top{display:flex;align-items:baseline;gap:10px;margin-bottom:.5rem;}
.hd-month{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;color:var(--t1);line-height:1.2;}
.hd-year{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;color:var(--amber);line-height:1.2;}
.hd-profit-lbl{font-size:11px;color:var(--t3);margin-top:1rem;margin-bottom:.3rem;}
.hd-amt{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:700;line-height:1.1;white-space:nowrap;}
.hd-amt.pos{color:var(--green);}.hd-amt.neg{color:var(--red);}
.hd-hr{border:none;border-top:1px solid var(--brd);margin:1rem 0;}
.hd-sub{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ms{background:var(--surf2);border-radius:12px;padding:10px 12px;}
.ms-l{font-size:11px;color:var(--t3);margin-bottom:4px;}
.ms-v{font-size:13px;font-weight:600;white-space:nowrap;}
.ms-v.pos{color:var(--green);}.ms-v.neg{color:var(--red);}

/* OPIU ROWS */
.stitle{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin:1.25rem 0 .5rem;}
.row{display:flex;align-items:center;justify-content:space-between;background:var(--surf);border-radius:14px;padding:12px 14px;margin-bottom:6px;border:1px solid var(--brd);gap:8px;transition:border-color .15s;}
.row:hover{border-color:var(--brd2);}
.rl{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
.ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rn{font-size:14px;font-weight:600;color:var(--t1);white-space:nowrap;}
.rs{font-size:11px;color:var(--t3);margin-top:1px;}
.rr{text-align:right;flex-shrink:0;}
.ra{font-size:14px;font-weight:600;white-space:nowrap;}
.ra.pos{color:var(--green);}.ra.neg{color:var(--red);}.ra.blue{color:var(--blue);}

/* Expandable rows */
.row-expandable{cursor:pointer;user-select:none;transition:border-color .15s,border-radius .2s;}
.row-expandable:hover{border-color:var(--brd2);}
.row-expandable.is-open{border-radius:14px 14px 0 0;border-bottom-color:transparent;}
.row-arrow{color:var(--t3);transition:transform .25s cubic-bezier(.4,0,.2,1);flex-shrink:0;}
.row-arrow.open{transform:rotate(180deg);}

/* Detail list — slides in below row, shares rounded card */
.detail-list{
  max-height:0;overflow:hidden;
  transition:max-height .3s cubic-bezier(.4,0,.2,1);
  background:var(--surf);
  border:1px solid var(--brd);border-top:none;
  border-radius:0 0 14px 14px;
  margin-top:-1px;margin-bottom:6px;
}

.detail-items{padding:4px 0 6px;}
.detail-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 16px;font-size:13px;color:var(--t1);
  border-bottom:1px solid rgba(0,0,0,.04);
}
.detail-item:last-of-type{border-bottom:none;}
.detail-name{flex:1;min-width:0;margin-right:12px;color:var(--t2);font-size:12px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.detail-amt{font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.detail-amt.pos{color:var(--green);}.detail-amt.neg{color:var(--red);}

.detail-total{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;font-size:13px;
  border-top:1px solid var(--brd);
  background:var(--surf2);
  border-radius:0 0 13px 13px;
  color:var(--t2);
}
.detail-total span:last-child{font-weight:700;color:var(--t1);}
.detail-loading,.detail-empty{
  padding:16px;font-size:12px;color:var(--t3);text-align:center;font-style:italic;
}

/* REPORT BAR — sticky relative to its scroll container */
/* On mobile: inside .page (no scroll) → needs topbar offset */
/* On desktop: inside .desk-report (scroll container) → top:0 */
/* Period switcher — sits between chart and table */
.period-switcher{
  display:flex;justify-content:flex-end;align-items:center;
  padding:1rem 1rem;
}
.ptabs{display:flex;gap:2px;background:var(--surf2);border-radius:8px;padding:2px;}
.ptab{font-family:'Golos Text',sans-serif;font-size:12px;font-weight:500;color:var(--t3);padding:5px 14px;border-radius:6px;cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap;}
.ptab.on{background:var(--surf);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.08);}

.chart-section{padding:.75rem 1rem .75rem;background:var(--surf);border-bottom:none;
  margin:1rem 1rem 0;border-radius:16px;border:1px solid var(--brd);}
.chart-toggles{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.75rem;}
.ctog{font-family:'Golos Text',sans-serif;font-size:11px;font-weight:500;padding:4px 10px;border-radius:12px;cursor:pointer;border:1.5px solid var(--brd);background:var(--surf);color:var(--t3);transition:all .15s;display:flex;align-items:center;gap:5px;}
.ctog .cdot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.ctog.on{color:var(--t1);border-color:var(--brd2);background:var(--surf2);}
.chart-c{position:relative;height:180px;}

/* FINANCIAL TABLE
   Key fixes:
   1. Single <table> — row heights always sync
   2. Explicit background colors on sticky cells (not 'inherit' which fails through overflow)
   3. No empty sec rows — sec header merged with first data row via rowspan or labels
   4. Removed duplicate empty sec rows
*/
.fin-outer{margin:0 1rem 2rem;border-radius:16px;border:1px solid var(--brd);overflow:hidden;background:var(--surf);}
.fin-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;position:relative;}
.fin-scroll::-webkit-scrollbar{height:4px;}
.fin-scroll::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px;}


table.fin{border-collapse:collapse;width:max-content;min-width:100%;}

/* Sticky first column — explicit bg per row color */
table.fin .sticky{position:sticky;left:0;z-index:2;}
table.fin .sticky::after{content:'';position:absolute;top:0;right:-6px;bottom:0;width:6px;background:linear-gradient(to right,rgba(0,0,0,.05),transparent);pointer-events:none;}

/* thead */
table.fin thead th{
  font-size:11px;font-weight:600;color:var(--t3);
  padding:9px 14px;text-align:right;white-space:nowrap;
  background:#fff;border-bottom:2px solid var(--brd2);
}
table.fin thead th.sticky{text-align:left;min-width:155px;width:155px;background:#fff;}
table.fin td.sticky{min-width:155px;width:155px;}

/* Section header rows — colored label, NO value cells */
table.fin tr.r-sec td{
  padding:8px 14px 7px;font-size:12px;font-weight:700;white-space:nowrap;
  border-bottom:1px solid rgba(0,0,0,.06);
}
/* Main data rows */
table.fin tr.r-main td{border-bottom:1px solid var(--brd);}
table.fin tr.r-main:last-child td{border-bottom:none;}
/* Sub rows */
table.fin tr.r-sub td{border-bottom:1px solid var(--brd);background:#fff!important;}
table.fin tr.r-sub td.sticky{background:#fff!important;}

.vn{font-size:12px;font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums;}
.vs{font-size:11px;font-weight:500;white-space:nowrap;font-variant-numeric:tabular-nums;}
.yy{font-size:10px;margin-top:1px;white-space:nowrap;font-style:italic;}
.vn.pos,.vs.pos{color:var(--green);}.vn.neg,.vs.neg{color:var(--red);}
.vn.neu,.vs.neu{color:var(--t1);}.vn.mut,.vs.mut{color:var(--t2);}
.yy.up{color:var(--green);}.yy.dn{color:var(--red);}

/* FIX 2: value cells — number top, yoy bottom, consistent height */
.cv{padding:7px 14px 5px;min-height:44px;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;}
.csv{padding:5px 14px 4px;min-height:34px;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;}
/* topRow value cell — slightly taller to fit label */
.cv.cv-top{min-height:52px;padding-top:20px;}

/* FIX 1: topRow — merged sec+data row */
table.fin tr.r-top td{border-bottom:1px solid var(--brd);}
table.fin tr.r-top:hover td{filter:brightness(.97);}
/* colored label sitting above the metric name inside the sticky cell */
.ctop{
  font-size:11px;font-weight:700;
  padding:5px 0 2px 0;
  display:block;
}
/* sticky cell in top row: label on top, metric name below */
.cn-top{
  display:flex;flex-direction:column;justify-content:space-between;
  padding:0 14px 6px;min-height:52px;font-size:12px;font-weight:700;color:var(--t1);
  white-space:nowrap;
}

/* FIX 3: left sidebar text — flush left like headers, no extra indent */
.cn{padding:8px 14px 6px;font-size:12px;font-weight:700;color:var(--t1);white-space:nowrap;min-height:44px;display:flex;flex-direction:column;justify-content:center;}
.csn{padding:6px 14px 5px 14px;font-size:11px;font-weight:400;color:#444;white-space:nowrap;min-height:34px;display:flex;flex-direction:column;justify-content:center;}

/* Row bands — explicit bg on sticky for correct scroll */
.band-rev{background:#EDF5FF;}
.band-costs{background:#FFF3F3;}
.band-tax{background:#FFFAF0;}
.band-div{background:#F0F4FF;}
.band-gross{background:#F0FFF4;}
.band-net{background:#F5FFF5;}
/* Sub rows always white bg */
tr.r-sub .band-rev,tr.r-sub .band-costs,tr.r-sub .band-tax,
tr.r-sub .band-div,tr.r-sub .band-gross,tr.r-sub .band-net{background:#fff!important;}

/* Section header darker shade */
.sec-rev{background:#D8EDFF;color:#1A4A8A;font-weight:700;}
.sec-costs{background:#FFE0E0;color:#8B1A1A;font-weight:700;}
.sec-tax{background:#FFF0CC;color:#7A4500;font-weight:700;}
.sec-div{background:#E0E6FF;color:#3D2F9E;font-weight:700;}
.sec-gross{background:#D0F5DC;color:#1A5C2A;font-weight:700;}
.sec-net{background:#DAFDE0;color:#1A5C2A;font-weight:700;}

table.fin tr.r-main:hover td,table.fin tr.r-sub:hover td{filter:brightness(.97);}

/* SKELETON / ERROR */
.skrow{height:64px;border-radius:14px;margin-bottom:6px;border:1px solid var(--brd);background:linear-gradient(90deg,var(--surf) 25%,var(--surf2) 50%,var(--surf) 75%);background-size:200% 100%;animation:sh 1.2s infinite;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.errbox{background:#FCEBEB;border:1px solid rgba(163,45,45,.2);border-radius:14px;padding:1.25rem;text-align:center;color:var(--red);font-size:13px;line-height:1.6;margin:1rem;}
.retry{margin-top:.75rem;background:var(--t1);color:var(--bg);border:none;border-radius:10px;padding:8px 18px;font-family:'Golos Text',sans-serif;font-size:13px;cursor:pointer;}

/* LAYOUT */
.m-opiu{padding:.875rem .875rem 3rem;}
.m-report{padding-bottom:3rem;}
.m-opiu.hide,.m-report.hide{display:none;}
.desk-opiu,.desk-report{display:none;}
/* FIX 4: no top gap on report page — .page padding is for opiu only */
.page.report-mode{padding-top:calc(var(--tbh) / 2);}

/* Mobile: narrow sticky col + blur text at right edge */
@media(max-width:899px){
  table.fin thead th.sticky{min-width:100px!important;width:100px!important;max-width:100px!important;}
  table.fin td.sticky{min-width:100px!important;width:100px!important;max-width:100px!important;}
  .cn,.csn,.cn-top{
    overflow:hidden!important;white-space:nowrap!important;
    -webkit-mask-image:linear-gradient(to right,#000 60%,transparent 92%);
    mask-image:linear-gradient(to right,#000 60%,transparent 92%);
  }
}

@media(min-width:900px){
  .m-opiu,.m-report{display:none!important;}
  .desk-opiu,.desk-report{display:flex;}

  /* FIX: align-items:flex-start ensures right panel starts at top */
  .desk-opiu{position:fixed;top:var(--tbh);left:0;right:0;bottom:0;overflow:hidden;align-items:flex-start;}
  .d-left{width:380px;flex-shrink:0;padding:1.5rem 1.25rem;overflow-y:auto;height:100%;border-right:1px solid var(--brd);}
  /* FIX: padding-top:0 so right content starts at same height as left */
  .d-right{flex:1;padding:0 1.5rem 1.5rem 2rem;overflow-y:auto;height:100%;max-width:700px;}

  .desk-report{position:fixed;top:var(--tbh);left:0;right:0;bottom:0;overflow-y:auto;flex-direction:column;}
  .desk-report .rpt-inner{width:100%;}

  .rn{font-size:15px;}.ra{font-size:16px;}
  .ic{width:42px;height:42px;font-size:20px;border-radius:13px;}
  .row{padding:14px 18px;border-radius:16px;}
  .stitle{font-size:12px;margin:1.5rem 0 .75rem;}
  .chart-c{height:200px;}
  table.fin thead th{font-size:12px;padding:10px 18px;}
  table.fin thead th.sticky{min-width:175px;width:175px;max-width:175px;}
  table.fin td.sticky{min-width:175px;width:175px;max-width:175px;}
  .cn,.csn{-webkit-mask-image:none;mask-image:none;overflow:visible;}
  .chart-section{margin:1rem 1.5rem 0;}
  .period-switcher{padding:1rem 1.5rem;}
  .fin-outer{margin:0 1.5rem 2rem;}
  .cn{font-size:13px;padding:9px 18px 7px;}
  .cv{padding:8px 18px 6px;}
  .csn{font-size:12px;padding:7px 18px 6px 30px;}
  .csv{padding:6px 18px 5px;}
  .vn{font-size:13px;}.vs{font-size:12px;}
}
.desk-opiu.hide,.desk-report.hide{display:none!important;}
</style>
</head>
<body>

<div class="tb">
  <div class="tb1">
    <button class="burger" id="burger" onclick="toggleDrawer()"><i></i><i></i><i></i></button>
    <div class="segtabs">
      <button class="segtab on" id="tab-opiu" onclick="setSec('opiu')">ОПиУ</button>
      <button class="segtab" id="tab-rpt" onclick="setSec('report')">Отчётность</button>
    </div>
    <div class="sync"><div class="dot spin" id="dot"></div><span id="stime">...</span></div>
  </div>
  <div class="mnav" id="mnav"></div>
</div>

<div class="ov" id="ov" onclick="closeDrawer()"></div>
<div class="dr" id="dr">
  <div style="font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;">Нобед <span style="color:var(--accent)">Букинг</span></div>
  <div class="dr-ttl">Меню</div>
  <button class="dr-item on" id="di-opiu" onclick="setSec('opiu');closeDrawer()">
    <svg class="dr-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="10" width="3" height="8" rx="1"/><rect x="8.5" y="5" width="3" height="13" rx="1"/><rect x="15" y="2" width="3" height="16" rx="1"/>
    </svg>
    ОПиУ
  </button>
  <button class="dr-item" id="di-rpt" onclick="setSec('report');closeDrawer()">
    <svg class="dr-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="2" width="14" height="16" rx="2"/><line x1="6.5" y1="6.5" x2="13.5" y2="6.5"/><line x1="6.5" y1="10" x2="13.5" y2="10"/><line x1="6.5" y1="13.5" x2="10.5" y2="13.5"/>
    </svg>
    Отчётность
  </button>
</div>

<div class="page" id="page">
  <div class="m-opiu" id="m-opiu">
    <div id="m-hero"></div>
    <div id="m-rows"><div class="skrow"></div><div class="skrow"></div><div class="skrow"></div></div>
  </div>
  <div class="m-report hide" id="m-report"><div id="m-rpt"></div></div>
  <div class="desk-opiu" id="d-opiu">
    <div class="d-left" id="d-left"></div>
    <div class="d-right" id="d-right"></div>
  </div>
  <div class="desk-report hide" id="d-report">
    <div class="rpt-inner" id="d-rpt"></div>
  </div>
</div>

<script>

const CSV_OPIU='https://docs.google.com/spreadsheets/d/e/2PACX-1vQZwm8zj9kaBFZCw7Ite6Xz2ZcBCIp8dC_zwbXTCI65I9EOFGAQAZa8R_6SKRvfEOI6iYukZqfR34vb/pub?gid=70554802&single=true&output=csv';
let OPIU_RAW=null; // cache
const MO={'Январь':0,'Февраль':1,'Март':2,'Апрель':3,'Май':4,'Июнь':5,'Июль':6,'Август':7,'Сентябрь':8,'Октябрь':9,'Ноябрь':10,'Декабрь':11};
const QQ={0:1,1:1,2:1,3:2,4:2,5:2,6:3,7:3,8:3,9:4,10:4,11:4};
let DATA=[],cur=0,sec='opiu',period='annual',chartInst=null;
let activeCharts=new Set(['rev','gross']);
const $=id=>document.getElementById(id);

function fmt(n){return Math.abs(n).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₽';}
function fmtM(n){
  const a=Math.abs(n);
  if(a>=1e6)return(n/1e6).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+' М';
  if(a>=1e3)return(n/1e3).toLocaleString('ru-RU',{minimumFractionDigits:1,maximumFractionDigits:1})+' К';
  return n.toLocaleString('ru-RU',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function pnum(s){if(!s)return 0;return parseFloat(s.replace(/\s/g,'').replace(/[^\d,.\-]/g,'').replace(',','.'))||0;}
function parseCSV(txt){
  return txt.split('\n').map(l=>{
    const c=[];let cur='',q=false;
    for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){c.push(cur.trim());cur='';}else cur+=ch;}
    c.push(cur.trim());return c;
  });
}
function parseData(rows){
  const m=[];
  for(const r of rows){
    const yr=(r[0]||'').trim(),mn=(r[1]||'').trim();
    if(!yr||!mn||!(mn in MO)||isNaN(+yr))continue;
    const net=pnum(r[6]),rev=pnum(r[2]),costs=pnum(r[10]);
    if(!rev&&!net&&!costs)continue;
    const mo=MO[mn];
    m.push({name:mn,year:yr,yr:+yr,mo,q:QQ[mo],
      profit:net,rev,costs,
      shows:pnum(r[7]),fin:pnum(r[8]),merch:pnum(r[9]),
      sal:pnum(r[11]),off:pnum(r[12]),tax:pnum(r[13]),div:pnum(r[14]),
      gross:pnum(r[5]),nm:pnum(r[16]),gm:pnum(r[15])
    });
  }
  return m;
}

/* REPORT */
const SERIES=[
  {key:'rev',   label:'Выручка',       color:'#378ADD'},
  {key:'gross', label:'Общ. прибыль',  color:'#639922'},
  {key:'profit',label:'Чист. прибыль', color:'#9FE1CB'},
  {key:'costs', label:'Расходы',       color:'#E24B4A'},
  {key:'tax',   label:'Налоги',        color:'#EF9F27'},
  {key:'div',   label:'Дивиденды',     color:'#7F77DD'},
];
function getPeriods(){
  if(period==='annual'){
    return[...new Set(DATA.map(m=>m.yr))].sort().map(y=>({label:`${y}`,data:DATA.filter(m=>m.yr===y)}));
  }
  const seen=new Set(),ps=[];
  DATA.forEach(m=>{
    const k=`${m.yr}-${m.q}`;
    if(!seen.has(k)){seen.add(k);ps.push({label:`Q${m.q} '${String(m.yr).slice(-2)}`,yr:m.yr,q:m.q,data:[]});}
    ps.find(p=>p.yr===m.yr&&p.q===m.q).data.push(m);
  });
  return ps;
}
function pStats(data){
  const s=k=>data.reduce((a,m)=>a+m[k],0);
  const avg=k=>{const nz=data.filter(m=>m[k]);return nz.length?nz.reduce((a,m)=>a+m[k],0)/nz.length:0;};
  return{rev:s('rev'),shows:Math.max(0,s('shows')),fin:Math.max(0,s('fin')),merch:Math.max(0,s('merch')),
    costs:s('costs'),sal:s('sal'),off:s('off'),tax:s('tax'),div:s('div'),
    gross:s('gross'),profit:s('profit'),nm:avg('nm'),gm:avg('gm')};
}
function yoyStr(curr,prev,inv=false){
  if(!prev)return'';
  const d=((curr-prev)/Math.abs(prev))*100;
  const up=inv?d<=0:d>=0;
  return`<div class="yy ${up?'up':'dn'}">${d>=0?'+':''}${d.toFixed(1)}%</div>`;
}
function yoy(all,i,key,inv=false){return i===0?'':yoyStr(all[i][key],all[i-1][key],inv);}

/* FIX: chart renders into whichever canvas is currently visible */
function buildChart(periods,allStats){

  let canvas=null;
  document.querySelectorAll('.chart-c canvas').forEach(c=>{
    if(c.offsetParent!==null)canvas=c;
  });

  chartInst=new Chart(canvas.getContext('2d'),{
    type:'bar',
    data:{labels:periods.map(p=>p.label),
      datasets:SERIES.filter(s=>activeCharts.has(s.key)).map(s=>({
        label:s.label,
        data:allStats.map(st=>s.key==='costs'?-st[s.key]:st[s.key]),
        backgroundColor:s.color+'CC',borderRadius:3,
      }))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmtM(c.raw)}`}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#9E9D97',maxRotation:45}},
        y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},color:'#9E9D97',callback:v=>{
              const a=Math.abs(v);
              if(a>=1e6)return(v/1e6).toLocaleString('ru-RU',{maximumFractionDigits:0})+' М';
              if(a>=1e3)return(v/1e3).toLocaleString('ru-RU',{maximumFractionDigits:0})+' К';
              return v.toLocaleString('ru-RU',{maximumFractionDigits:0});
            }}}}}

}
function toggleChart(key){

/* TABLE — single <table>, sticky first col with explicit bg colors */
function buildTable(periods,allStats){
  const ths=periods.map(p=>`<th style="min-width:100px">${p.label}</th>`).join('');
  function vm(i,key,cls,inv=false,fn=fmtM,band=''){
    const v=allStats[i][key];
    return`<td class="${band}"><div class="cv"><div class="vn ${cls(v)}">${fn(v)}</div>${yoy(allStats,i,key,inv)}</div></td>`;
  }
  function vtop(i,key,cls,inv=false,fn=fmtM,band=''){
    const v=allStats[i][key];
    return`<td class="${band}"><div class="cv cv-top"><div class="vn ${cls(v)}">${fn(v)}</div>${yoy(allStats,i,key,inv)}</div></td>`;
  }
  function vs_(i,key,cls,inv=false,fn=fmtM,band=''){
    const v=allStats[i][key];
    return`<td class="${band}"><div class="csv"><div class="vs ${cls(v)}">${fn(v)}</div>${yoy(allStats,i,key,inv)}</div></td>`;
  }
  const pf=v=>v.toFixed(1)+'%';
  const gcl=v=>v>=0?'pos':'neg';
  const ncl=()=>'neu';
  const mcl=()=>'mut';
  const ngcl=()=>'neg';
  const N=periods.length;
  const empties=periods.map(()=>`<td></td>`).join('');

  /* FIX: section header row merges the colored label — NO separate empty data row.
     The first data row immediately follows without a gap. */
  const rows=[];
  function secRow(label,secCls,band){
    rows.push(`<tr class="r-sec"><td class="sticky ${secCls}">${label}</td>${periods.map(()=>`<td class="${band}"></td>`).join('')}</tr>`);
  }
  function mainRow(label,key,cls,inv,fn=fmtM,band){
    rows.push(`<tr class="r-main"><td class="sticky ${band}"><div class="cn">${label}</div></td>${periods.map((_,i)=>vm(i,key,cls,inv,fn,band)).join('')}</tr>`);
  }
  function subRow(label,key,cls,inv,fn=fmtM,band){
    rows.push(`<tr class="r-sub"><td class="sticky ${band}"><div class="csn">${label}</div></td>${periods.map((_,i)=>vs_(i,key,cls,inv,fn,band)).join('')}</tr>`);
  }
  // topRow: single colored label — no duplication
  function topRow(label,key,cls,inv,fn=fmtM,band,secCls){
    const colorMap={'sec-rev':'#1A4A8A','sec-costs':'#8B1A1A','sec-tax':'#7A4500','sec-div':'#3D2F9E','sec-gross':'#1A5C2A','sec-net':'#1A5C2A'};
    const col=colorMap[secCls]||'#333';
    rows.push(`<tr class="r-top"><td class="sticky ${band}"><div class="cn" style="color:${col}">${label}</div></td>${periods.map((_,i)=>vtop(i,key,cls,inv,fn,band)).join('')}</tr>`);
  }

  // No separate secRow — label is a top-line inside the mainRow sticky cell
  topRow('Выручка','rev',ncl,false,fmtM,'band-rev','sec-rev');
  subRow('• Мероприятия','shows',mcl,false,fmtM,'band-rev');
  subRow('• Мерчендайзинг','merch',mcl,false,fmtM,'band-rev');
  subRow('• Фин. операции','fin',mcl,false,fmtM,'band-rev');
  topRow('Расходы','costs',ngcl,true,fmtM,'band-costs','sec-costs');
  subRow('• Сотрудники','sal',ngcl,true,fmtM,'band-costs');
  subRow('• Офис и сервисы','off',ngcl,true,fmtM,'band-costs');
  topRow('Налоги','tax',ngcl,true,fmtM,'band-tax','sec-tax');
  topRow('Дивиденды','div',ngcl,true,fmtM,'band-div','sec-div');
  topRow('Общ. прибыль','gross',gcl,false,fmtM,'band-gross','sec-gross');
  subRow('• Общ. маржа %','gm',gcl,false,pf,'band-gross');
  subRow('• Мероприятия','shows',mcl,false,fmtM,'band-gross');
  subRow('• Мерчендайзинг','merch',mcl,false,fmtM,'band-gross');
  subRow('• Фин. операции','fin',mcl,false,fmtM,'band-gross');
  topRow('Чистая прибыль','profit',gcl,false,fmtM,'band-net','sec-net');
  subRow('• Чист. маржа %','nm',gcl,false,pf,'band-net');

  return`<div class="fin-outer"><div class="fin-scroll"><table class="fin">
    <thead><tr><th class="sticky" style="min-width:155px;text-align:left">Показатель</th>${ths}</tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table></div></div>`;
}

// Real CSV structure (0-based):
// col 1 = дата ("31 мар. 2026")
// col 4 = год ("2026 г.")
// col 5 = категория ("Прибыль","Расходы","Зарплаты","Налоги","Вывод / Диви.")
// col 7 = артист/проект/статья
// col 8 = город (если концерт)
// col 9 = фин. результат (доходы)
// col 10 = расходы/издержки
// col 11 = налоги
// col 12 = дивиденды/выводы

// Month short names in dates like "31 мар. 2026" or "1 мар. 2026"
const MO_SHORT={
  'янв':1,'фев':2,'мар':3,'апр':4,'май':5,'июн':6,
  'июл':7,'авг':8,'сен':9,'окт':10,'ноя':11,'дек':12
};

function parseRowDate(r){
  // col 1: "31 мар. 2026" or "1 мар. 2026"
  const dateStr=(r[1]||'').trim().toLowerCase();
  // col 4: "2026 г." or "2025 г."
  const yearStr=(r[4]||'').trim();
  const yr=parseInt(yearStr);

  // Extract month from date string
  let mo=0;
  for(const [abbr,num] of Object.entries(MO_SHORT)){
    if(dateStr.includes(abbr)){mo=num;break;}
  }
  return{mo,yr};
}

function getDetailItems(rows, monthName, year, section){
  const MO_NUM={'Январь':1,'Февраль':2,'Март':3,'Апрель':4,'Май':5,'Июнь':6,
    'Июль':7,'Август':8,'Сентябрь':9,'Октябрь':10,'Ноябрь':11,'Декабрь':12};
  const targetMo=MO_NUM[monthName];
  const targetYr=parseInt(year);

  return rows.filter(r=>{
    const {mo,yr}=parseRowDate(r);
    if(mo!==targetMo||yr!==targetYr)return false;

    const cat=(r[5]||'').trim();
    const city=(r[8]||'').trim();
    const name=(r[7]||'').trim();
    if(!name||name==='Не указан')return false;

    const isMagaz=name.startsWith('Магазин ');
    if(section==='shows') return city!=='';
    if(section==='merch') return cat==='Магазины'||isMagaz; // Магазины cat + any "Магазин X" names
    if(section==='fin')   return cat==='Прибыль'&&city===''&&!isMagaz; // exclude Магазин names
    if(section==='sal')   return cat==='Зарплаты';
    if(section==='off')   return cat==='Расходы';
    if(section==='tax')   return cat==='Налоги';
    if(section==='div')   return cat.includes('Вывод')||cat.includes('Диви');
    return false;
  }).map(r=>{
    const name=(r[7]||'').trim();
    const city=(r[8]||'').trim();
    const label=city?`${name} — ${city}`:name;
    // Get signed amounts from correct columns
    const finResult=pnum(r[9]);   // col J — positive = income
    const costs=pnum(r[10]);      // col K — positive = expense
    const taxes=pnum(r[11]);      // col L — positive = tax
    const divs=pnum(r[12]);       // col M — positive = dividend
    let amount=0;
    if(section==='sal'||section==='off') amount=-Math.abs(costs);
    else if(section==='tax')             amount=-Math.abs(taxes);
    else if(section==='div')             amount=-Math.abs(divs);
    else                                 amount=finResult; // keep original sign
    return{label,amount};
  }).filter(x=>x.amount!==0);
}

let expandedRow=null; // track which row is open

async function toggleDetail(el, section){
  const container=el.nextElementSibling;
  if(!container||!container.classList.contains('detail-list')){return;}

  // close if already open
  if(expandedRow===el){
    container.style.maxHeight='0';
    setTimeout(()=>{container.innerHTML='';},300);
    el.classList.remove('is-open');
    expandedRow=null;
    el.querySelector('.row-arrow')?.classList.remove('open');
    return;
  }
  // close previous
  if(expandedRow){
    const prev=expandedRow.nextElementSibling;
    if(prev){prev.style.maxHeight='0';setTimeout(()=>{prev.innerHTML='';},300);}
    expandedRow.classList.remove('is-open');
    expandedRow.querySelector('.row-arrow')?.classList.remove('open');
  }
  expandedRow=el;
  el.classList.add('is-open');
  el.querySelector('.row-arrow')?.classList.add('open');

  container.innerHTML='<div class="detail-loading">Загрузка...</div>';
  container.style.maxHeight='600px';

  try{
    const m=DATA[cur];
    const rows=await loadOpiuDetail();
    const items=getDetailItems(rows,m.name,m.year,section);
    if(!items.length){
      container.innerHTML='<div class="detail-empty">Нет данных за этот период</div>';
      return;
    }
    const total=items.reduce((s,x)=>s+x.amount,0);
    const isNeg=section==='sal'||section==='off'||section==='tax'||section==='div';
    container.innerHTML=`
      <div class="detail-items">
        ${items.map(x=>`
          <div class="detail-item">
            <span class="detail-name">${x.label}</span>
            <span class="detail-amt ${isNeg?'neg':'pos'}">${isNeg?'− ':'+ '}${fmt(Math.abs(x.amount))}</span>
          </div>`).join('')}
        <div class="detail-total">
          <span>Итого</span>
          <span class="${isNeg?'neg':'pos'}" style="font-weight:700">${isNeg?'− ':'+ '}${fmt(Math.abs(total))}</span>
        </div>
      </div>`;
  }catch(e){
    container.innerHTML=`<div class="detail-empty">Ошибка: ${e.message}</div>`;
  }
}

async function load(){
  const dot=$('dot'),st=$('stime');
  dot.className='dot spin';st.textContent='...';
  try{
    const r=await fetch(CSV);
    if(!r.ok)throw new Error('HTTP '+r.status);
    DATA=parseData(parseCSV(await r.text()));
    if(!DATA.length)throw new Error('Нет данных');
    cur=DATA.length-1;
    renderNav();renderOpiu();
    if(sec==='report')renderReport();
    dot.className='dot live';
    const n=new Date();st.textContent=`${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
  }catch(e){
    dot.className='dot err';st.textContent='Ошибка';
    const eb=`<div class="errbox"><div style="font-weight:600;margin-bottom:6px">Ошибка загрузки</div><div>${e.message}</div><button class="retry" onclick="load()">Повторить</button></div>`;
    $('m-rows').innerHTML=eb;$('d-right').innerHTML=eb;
  }
}
load();
setInterval(load,5*60*1000);
// Re-render report on resize (mobile/desktop switch)
let lastW=window.innerWidth;
window.addEventListener('resize',()=>{
  if(Math.abs(window.innerWidth-lastW)>50){lastW=window.innerWidth;if(sec==='report'&&DATA.length)renderReport();}
});
</script>
</body>
</html>
