<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОПиУ — Нобед Букинг</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#F7F6F2; --surf:#fff; --surf2:#F0EFE9;
  --brd:rgba(0,0,0,.08); --brd2:rgba(0,0,0,.15);
  --t1:#1A1A18; --t2:#6B6A65; --t3:#9E9D97;
  --green:#3B6D11; --red:#A32D2D; --blue:#185FA5;
  --amber:#BA7517; --accent:#D85A30;
  --tbh:84px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;}

/* ─── TOPBAR ─── */
.tb{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:var(--surf);border-bottom:1px solid var(--brd);
  padding:.875rem 1rem 0;
}
.tb-row1{display:flex;align-items:center;gap:10px;margin-bottom:.5rem;}
.logo{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;flex-shrink:0;}
.logo em{color:var(--accent);font-style:normal;}
.tabs{display:flex;gap:3px;background:var(--surf2);border-radius:20px;padding:3px;flex:1;max-width:260px;margin:0 auto;}
.tab{flex:1;text-align:center;font-size:12px;font-weight:500;color:var(--t3);padding:5px 6px;border-radius:17px;cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap;font-family:'Golos Text',sans-serif;}
.tab.on{background:var(--surf);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.sync{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);flex-shrink:0;}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;}
.dot.live{background:#639922;} .dot.spin{background:var(--amber);animation:pulse 1s infinite;} .dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.mnav{display:flex;overflow-x:auto;gap:2px;padding-bottom:.75rem;scrollbar-width:none;}
.mnav::-webkit-scrollbar{display:none;}
.mnav.hide{display:none;}
.mtab{flex-shrink:0;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:500;color:var(--t3);padding:5px 13px;border-radius:20px;cursor:pointer;border:none;background:none;white-space:nowrap;transition:all .15s;}
.mtab:hover{color:var(--t2);background:var(--surf2);}
.mtab.on{background:var(--t1);color:var(--bg);}

/* ─── BURGER ─── */
.burger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.burger i{display:block;width:20px;height:2px;background:var(--t1);border-radius:2px;transition:all .2s;}
.burger.open i:nth-child(1){transform:translateY(7px) rotate(45deg);}
.burger.open i:nth-child(2){opacity:0;}
.burger.open i:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* ─── DRAWER ─── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s;}
.ov.on{opacity:1;pointer-events:all;}
.dr{position:fixed;top:0;left:-270px;bottom:0;width:250px;background:var(--surf);z-index:301;transition:left .25s cubic-bezier(.4,0,.2,1);padding:1.5rem 1.25rem;display:flex;flex-direction:column;gap:3px;}
.dr.on{left:0;}
.dr-ttl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin:2rem 0 .4rem;}
.dr-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Golos Text',sans-serif;font-size:14px;color:var(--t2);transition:all .15s;}
.dr-item:hover,.dr-item.on{background:var(--surf2);color:var(--t1);font-weight:600;}

/* ─── PAGE SHELL ─── */
.page{padding-top:var(--tbh);}

/* ─── HERO ─── */
.hero{background:var(--surf);border-radius:20px;padding:1.25rem;border:1px solid var(--brd);}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:1.25rem;}
.h-month{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;line-height:1.2;white-space:nowrap;}
.h-year{font-family:'Unbounded',sans-serif;font-size:12px;color:var(--amber);margin-top:3px;}
.h-amount{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;line-height:1.2;white-space:nowrap;}
.h-amount.pos{color:var(--green);} .h-amount.neg{color:var(--red);}
.h-label{font-size:11px;color:var(--t3);margin-top:3px;text-align:right;}
.mini{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mstat{background:var(--surf2);border-radius:12px;padding:10px 12px;}
.mstat-l{font-size:11px;color:var(--t3);margin-bottom:4px;}
.mstat-v{font-size:13px;font-weight:600;white-space:nowrap;}
.mstat-v.pos{color:var(--green);} .mstat-v.neg{color:var(--red);}

/* ─── ROWS ─── */
.stitle{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin:1.25rem 0 .5rem;}
.row{display:flex;align-items:center;justify-content:space-between;background:var(--surf);border-radius:14px;padding:12px 14px;margin-bottom:6px;border:1px solid var(--brd);gap:8px;transition:border-color .15s;}
.row:hover{border-color:var(--brd2);}
.rl{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
.ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rn{font-size:14px;font-weight:600;color:var(--t1);white-space:nowrap;}
.rs{font-size:11px;color:var(--t3);margin-top:1px;}
.rr{text-align:right;flex-shrink:0;}
.ra{font-size:14px;font-weight:600;white-space:nowrap;}
.ra.pos{color:var(--green);} .ra.neg{color:var(--red);} .ra.blue{color:var(--blue);}

/* ─── REPORT ─── */
.rpt-inner{max-width:100%;}
.chart-card{background:var(--surf);border-radius:20px;padding:1.25rem;border:1px solid var(--brd);margin-bottom:1rem;}
.cc-title{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:.75rem;}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:.75rem;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);}
.ld{width:10px;height:10px;border-radius:3px;}
.cc-wrap{position:relative;height:180px;}

.yfilt{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem;}
.ybtn{font-family:'Golos Text',sans-serif;font-size:12px;font-weight:500;color:var(--t3);padding:4px 12px;border-radius:14px;border:1px solid var(--brd);background:var(--surf);cursor:pointer;transition:all .15s;}
.ybtn:hover{border-color:var(--brd2);color:var(--t2);}
.ybtn.on{background:var(--t1);color:var(--bg);border-color:var(--t1);}

/* Annual table */
.atable{background:var(--surf);border-radius:20px;border:1px solid var(--brd);overflow:hidden;width:100%;}
.ath{display:flex;border-bottom:2px solid var(--brd);padding:10px 14px;gap:8px;align-items:center;}
.ath-name{flex:1;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;}
.ath-yr{font-size:11px;font-weight:600;color:var(--t3);text-align:right;min-width:100px;}
.mrow{padding:11px 14px;border-bottom:1px solid var(--brd);display:flex;gap:8px;align-items:flex-start;}
.mrow:last-child{border-bottom:none;}
.mrow.hl{background:var(--surf2);}
.mrow-name{flex:1;font-size:13px;font-weight:600;color:var(--t1);}
.mrow-name.sub{font-size:12px;font-weight:500;color:var(--t2);padding-left:10px;}
.mrow-col{text-align:right;min-width:100px;}
.mval{font-size:13px;font-weight:600;white-space:nowrap;}
.mval.pos{color:var(--green);} .mval.neg{color:var(--red);} .mval.neu{color:var(--t1);} .mval.mut{color:var(--t2);}
.myoy{font-size:11px;margin-top:2px;white-space:nowrap;}
.myoy.up{color:var(--green);} .myoy.dn{color:var(--red);}

/* ─── ERROR / SKEL ─── */
.errbox{background:#FCEBEB;border:1px solid rgba(163,45,45,.2);border-radius:14px;padding:1.25rem;text-align:center;color:var(--red);font-size:13px;line-height:1.6;}
.retry{margin-top:.75rem;background:var(--t1);color:var(--bg);border:none;border-radius:10px;padding:8px 18px;font-family:'Golos Text',sans-serif;font-size:13px;cursor:pointer;}
.sk{background:linear-gradient(90deg,var(--surf2) 25%,var(--brd) 50%,var(--surf2) 75%);background-size:200% 100%;animation:sh 1.2s infinite;border-radius:8px;}
.skrow{height:64px;border-radius:14px;margin-bottom:6px;border:1px solid var(--brd);background:linear-gradient(90deg,var(--surf) 25%,var(--surf2) 50%,var(--surf) 75%);background-size:200% 100%;animation:sh 1.2s infinite;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ─── MOBILE ─── */
.m-opiu{padding:.875rem .875rem 3rem;}
.m-report{padding:.875rem .875rem 3rem;}
.m-report.hide,.m-opiu.hide{display:none;}
.desk-opiu,.desk-report{display:none;}

/* ─── DESKTOP ─── */
@media(min-width:900px){
  :root{--tbh:80px;}

  /* Hide mobile views */
  .m-opiu,.m-report{display:none!important;}

  /* Show desktop views */
  .desk-opiu,.desk-report{display:flex;}

  /* Desktop layout: fixed left panel + scrollable right */
  .desk-opiu{
    position:fixed;top:var(--tbh);left:0;right:0;bottom:0;
    overflow:hidden;
  }
  .d-left{
    width:320px;flex-shrink:0;
    padding:1.5rem;
    overflow-y:auto;
    height:100%;
    border-right:1px solid var(--brd);
  }
  .d-right{
    flex:1;
    padding:1.5rem;
    overflow-y:auto;
    height:100%;
  }

  .desk-report{
    position:fixed;top:var(--tbh);left:0;right:0;bottom:0;
    overflow-y:auto;
    padding:1.5rem;
    justify-content:center;
  }
  .desk-report .rpt-inner{max-width:900px;width:100%;}

  /* Bigger text on desktop */
  .h-month{font-size:24px;}
  .h-amount{font-size:20px;}
  .mstat-v{font-size:15px;}
  .row{padding:14px 18px;border-radius:16px;}
  .rn{font-size:15px;} .ra{font-size:16px;}
  .ic{width:42px;height:42px;font-size:20px;border-radius:13px;}
  .stitle{font-size:12px;margin:1.5rem 0 .75rem;}
  .cc-wrap{height:220px;}
  .mval{font-size:14px;}
  .mrow-name{font-size:14px;}
  .ath-yr,.mrow-col{min-width:120px;}
}

/* hide desktop sections that are off */
.desk-opiu.hide,.desk-report.hide{display:none!important;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="tb">
  <div class="tb-row1">
    <button class="burger" id="burger" onclick="toggleDrawer()"><i></i><i></i><i></i></button>
    <div class="tabs">
      <button class="tab on" id="tab-opiu" onclick="setSection('opiu')">ОПиУ</button>
      <button class="tab" id="tab-rpt" onclick="setSection('report')">Отчётность</button>
    </div>
    <div class="sync"><div class="dot spin" id="dot"></div><span id="stime">...</span></div>
  </div>
  <div class="mnav" id="mnav"></div>
</div>

<!-- DRAWER -->
<div class="ov" id="ov" onclick="closeDrawer()"></div>
<div class="dr" id="dr">
  <div class="dr-ttl">Разделы</div>
  <button class="dr-item on" id="di-opiu" onclick="setSection('opiu');closeDrawer()">📊 ОПиУ — прибыли и убытки</button>
  <button class="dr-item" id="di-rpt" onclick="setSection('report');closeDrawer()">📈 Годовая отчётность</button>
</div>

<!-- PAGE -->
<div class="page">

  <!-- MOBILE: ОПиУ -->
  <div class="m-opiu" id="m-opiu">
    <div id="m-hero"></div>
    <div id="m-rows"><div class="skrow"></div><div class="skrow"></div><div class="skrow"></div></div>
  </div>

  <!-- MOBILE: Отчётность -->
  <div class="m-report hide" id="m-report">
    <div id="m-rpt-content"></div>
  </div>

  <!-- DESKTOP: ОПиУ -->
  <div class="desk-opiu" id="d-opiu">
    <div class="d-left" id="d-left"></div>
    <div class="d-right" id="d-right"></div>
  </div>

  <!-- DESKTOP: Отчётность -->
  <div class="desk-report hide" id="d-report">
    <div class="rpt-inner" id="d-rpt-content"></div>
  </div>

</div>

<script>
const CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQZwm8zj9kaBFZCw7Ite6Xz2ZcBCIp8dC_zwbXTCI65I9EOFGAQAZa8R_6SKRvfEOI6iYukZqfR34vb/pub?gid=678223172&single=true&output=csv';
const MO={'Январь':0,'Февраль':1,'Март':2,'Апрель':3,'Май':4,'Июнь':5,'Июль':6,'Август':7,'Сентябрь':8,'Октябрь':9,'Ноябрь':10,'Декабрь':11};

let DATA=[],cur=0,sec='opiu',selYear=null,chartInst=null;

// ── utils ──
const $=id=>document.getElementById(id);
function fmt(n){return Math.abs(n).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₽';}
function fmtM(n){
  const a=Math.abs(n);
  if(a>=1e6) return (n/1e6).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+' М';
  if(a>=1e3) return (n/1e3).toLocaleString('ru-RU',{minimumFractionDigits:1,maximumFractionDigits:1})+' К';
  return n.toLocaleString('ru-RU',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function pct(v){return(v>=0?'+':'')+v.toFixed(1)+'%';}
function pnum(s){if(!s)return 0;return parseFloat(s.replace(/\s/g,'').replace(/[^\d,.\-]/g,'').replace(',','.'))||0;}
function csv(txt){
  return txt.split('\n').map(l=>{
    const c=[];let cur='',q=false;
    for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){c.push(cur.trim());cur='';}else cur+=ch;}
    c.push(cur.trim());return c;
  });
}
function parse(rows){
  const m=[];
  for(const r of rows){
    const y=(r[0]||'').trim(),mn=(r[1]||'').trim();
    if(!y||!mn||!(mn in MO)||isNaN(+y))continue;
    const net=pnum(r[6]),rev=pnum(r[2]),costs=pnum(r[10]);
    if(!rev&&!net&&!costs)continue;
    m.push({name:mn,year:y,yr:+y,
      profit:net,rev,costs,
      shows:pnum(r[7]),fin:pnum(r[8]),merch:pnum(r[9]),
      sal:pnum(r[11]),off:pnum(r[12]),tax:pnum(r[13]),div:pnum(r[14]),
      gross:pnum(r[5]),gm:pnum(r[15]),nm:pnum(r[16])
    });
  }
  return m;
}

// ── section ──
function setSection(s){
  sec=s;
  $('tab-opiu').classList.toggle('on',s==='opiu');
  $('tab-rpt').classList.toggle('on',s==='report');
  $('di-opiu').classList.toggle('on',s==='opiu');
  $('di-rpt').classList.toggle('on',s==='report');
  $('mnav').classList.toggle('hide',s==='report');

  // mobile
  $('m-opiu').classList.toggle('hide',s!=='opiu');
  $('m-report').classList.toggle('hide',s!=='report');
  // desktop
  $('d-opiu').classList.toggle('hide',s!=='opiu');
  $('d-report').classList.toggle('hide',s!=='report');

  if(s==='report'&&DATA.length) renderReport();
  window.scrollTo({top:0});
}

// ── drawer ──
function toggleDrawer(){const o=$('dr').classList.toggle('on');$('ov').classList.toggle('on',o);$('burger').classList.toggle('open',o);}
function closeDrawer(){$('dr').classList.remove('on');$('ov').classList.remove('on');$('burger').classList.remove('open');}

// ── ОПиУ ──
function heroH(m){
  const pc=m.profit>=0?'pos':'neg',ps=m.profit>=0?'+':'−';
  return`<div class="hero">
  <div class="hero-top">
    <div><div class="h-month">${m.name}</div><div class="h-year">${m.year}</div></div>
    <div style="text-align:right"><div class="h-amount ${pc}">${ps} ${fmt(m.profit)}</div><div class="h-label">чистая прибыль</div></div>
  </div>
  <div class="mini">
    <div class="mstat"><div class="mstat-l">Доходы</div><div class="mstat-v pos">+ ${fmt(m.rev)}</div></div>
    <div class="mstat"><div class="mstat-l">Расходы</div><div class="mstat-v neg">− ${fmt(m.costs)}</div></div>
  </div></div>`;
}
function rowsH(m){
  const inc=[
    m.shows&&{ic:'🎭',n:'Концерты',s:'Прибыль по мероприятиям',a:m.shows,bg:'#EAF3DE',blue:false},
    m.fin&&{ic:'🏛️',n:'Фин.Операции',s:'Управление финансами',a:m.fin,bg:'#E6F1FB',blue:false},
    m.merch&&{ic:'🛒',n:'Магазины',s:'Прибыль по мерчендайзингу',a:m.merch,bg:'#FAEEDA',blue:false},
  ].filter(Boolean);
  const exp=[
    m.sal&&{ic:'👔',n:'Зарплаты',s:'Фонд оплаты труда',a:m.sal,bg:'#F1EFE8',blue:false},
    m.off&&{ic:'🏢',n:'Офис и сервисы',s:'Содержание бизнеса',a:m.off,bg:'#F1EFE8',blue:false},
    m.tax&&{ic:'📮',n:'Налоги',s:'Вся налоговая нагрузка',a:m.tax,bg:'#FCEBEB',blue:false},
    m.div&&{ic:'🧳',n:'Дивиденды',s:'Див. зарплата + инвестиции',a:m.div,bg:'#E6F1FB',blue:true},
  ].filter(Boolean);
  let h='<div class="stitle">Доходы</div>';
  inc.forEach(c=>{
    const sg=c.a>=0?'+':'−',cl=c.a>=0?'pos':'neg';
    h+=`<div class="row"><div class="rl"><div class="ic" style="background:${c.bg}">${c.ic}</div><div><div class="rn">${c.n}</div><div class="rs">${c.s}</div></div></div><div class="rr"><div class="ra ${cl}">${sg} ${fmt(c.a)}</div></div></div>`;
  });
  h+='<div class="stitle">Расходы</div>';
  exp.forEach(c=>{
    const cl=c.blue?'blue':'neg';
    h+=`<div class="row"><div class="rl"><div class="ic" style="background:${c.bg}">${c.ic}</div><div><div class="rn">${c.n}</div><div class="rs">${c.s}</div></div></div><div class="rr"><div class="ra ${cl}">− ${fmt(Math.abs(c.a))}</div></div></div>`;
  });
  return h;
}

function renderNav(){
  $('mnav').innerHTML=DATA.map((m,i)=>`<button class="mtab ${i===cur?'on':''}" onclick="sel(${i})">${m.name} ${m.year.slice(-2)}</button>`).join('');
  requestAnimationFrame(()=>{const a=document.querySelector('.mtab.on');if(a)a.scrollIntoView({inline:'center',block:'nearest'});});
}
function sel(i){cur=i;renderNav();renderOpiu();window.scrollTo({top:0,behavior:'smooth'});}

function renderOpiu(){
  const m=DATA[cur];
  // mobile
  $('m-hero').innerHTML=heroH(m);
  $('m-rows').innerHTML=rowsH(m);
  // desktop
  $('d-left').innerHTML=heroH(m);
  $('d-right').innerHTML=rowsH(m);
}

// ── Отчётность ──
function yearData(y){
  const ms=DATA.filter(m=>m.yr===y);
  const s=k=>ms.reduce((a,m)=>a+m[k],0);
  const nonzero=k=>ms.filter(m=>m[k]);
  return{y,
    rev:s('rev'),shows:Math.max(0,s('shows')),merch:Math.max(0,s('merch')),fin:Math.max(0,s('fin')),
    costs:s('costs'),sal:s('sal'),off:s('off'),tax:s('tax'),div:s('div'),
    gross:s('gross'),net:s('profit'),
    gm:nonzero('gm').reduce((a,m)=>a+m.gm,0)/(nonzero('gm').length||1),
    nm:nonzero('nm').reduce((a,m)=>a+m.nm,0)/(nonzero('nm').length||1),
  };
}

function renderChart(years,ydm){
  if(chartInst){chartInst.destroy();chartInst=null;}
  const canvas=$('rpt-chart');if(!canvas)return;
  chartInst=new Chart(canvas.getContext('2d'),{
    type:'bar',
    data:{
      labels:years,
      datasets:[
        {label:'Выручка',data:years.map(y=>ydm[y].rev),backgroundColor:'#378ADD',borderRadius:4},
        {label:'Расходы',data:years.map(y=>-ydm[y].costs),backgroundColor:'#E24B4A',borderRadius:4},
        {label:'Прибыль',data:years.map(y=>ydm[y].net),backgroundColor:'#639922',borderRadius:4},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmtM(c.raw)}`}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:11},color:'#9E9D97'}},
        y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:11},color:'#9E9D97',callback:v=>fmtM(v)}}
      }
    }
  });
}

function yoyH(curr,prev){
  if(prev===null||prev===undefined)return'';
  if(!prev)return'';
  const d=((curr-prev)/Math.abs(prev))*100;
  return`<div class="myoy ${d>=0?'up':'dn'}">${pct(d)}</div>`;
}

function tableH(years,ydm){
  const prevOf=(y,i)=>i>0?ydm[years[i-1]]:null;
  function row(label,key,cl,sub=false,fn=fmtM){
    return`<div class="mrow${sub?'':' hl'}">
      <div class="mrow-name${sub?' sub':''}">${label}</div>
      ${years.map((y,i)=>{
        const d=ydm[y],p=prevOf(y,i),v=d[key],pv=p?p[key]:null;
        const sign=(key==='net'||key==='gross')?(v>=0?'+ ':'− '):'';
        return`<div class="mrow-col"><div class="mval ${cl(v)}">${sign}${fn(v)}</div>${yoyH(v,pv)}</div>`;
      }).join('')}
    </div>`;
  }
  const yrh=years.map(y=>`<div class="ath-yr">${y}</div>`).join('');
  return`<div class="atable">
    <div class="ath"><div class="ath-name">Показатель</div>${yrh}</div>
    ${row('Выручка / Revenue','rev',()=>'neu')}
    ${row('• Мероприятия','shows',()=>'mut',true)}
    ${row('• Мерчендайзинг','merch',()=>'mut',true)}
    ${row('• Фин. операции','fin',()=>'mut',true)}
    ${row('Расходы / Costs','costs',()=>'neg')}
    ${row('• Зарплаты','sal',()=>'neg',true)}
    ${row('• Офис и сервисы','off',()=>'neg',true)}
    ${row('Налоги','tax',()=>'neg')}
    ${row('Дивиденды','div',()=>'neg')}
    ${row('Чистая прибыль / NET','net',v=>v>=0?'pos':'neg')}
    ${row('Чистая маржа %','nm',v=>v>=0?'pos':'neg',false,v=>v.toFixed(1)+'%')}
  </div>`;
}

function renderReport(){
  const years=[...new Set(DATA.map(m=>m.yr))].sort();
  const ydm={};years.forEach(y=>ydm[y]=yearData(y));
  const disp=selYear?[selYear]:years;

  const yfH=['Все',...years].map(y=>`<button class="ybtn ${(y==='Все'&&!selYear)||(y===selYear)?'on':''}" onclick="pickY(${y==='Все'?'null':y})">${y}</button>`).join('');

  const html=`
    <div class="chart-card">
      <div class="cc-title">Динамика по годам</div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:#378ADD"></div>Выручка</div>
        <div class="li"><div class="ld" style="background:#E24B4A"></div>Расходы</div>
        <div class="li"><div class="ld" style="background:#639922"></div>Прибыль</div>
      </div>
      <div class="cc-wrap"><canvas id="rpt-chart"></canvas></div>
    </div>
    <div class="yfilt">${yfH}</div>
    ${tableH(disp,ydm)}`;

  $('m-rpt-content').innerHTML=html;
  $('d-rpt-content').innerHTML=html;
  // Chart needs to be rendered per canvas — pick whichever is visible
  setTimeout(()=>{
    const canvas=$('rpt-chart');
    if(canvas) renderChart(years,ydm);
  },50);
}

function pickY(y){selYear=y;renderReport();}

// ── load ──
async function load(){
  const dot=$('dot'),st=$('stime');
  dot.className='dot spin';st.textContent='...';
  try{
    const r=await fetch(CSV);
    if(!r.ok)throw new Error('HTTP '+r.status);
    DATA=parse(csv(await r.text()));
    if(!DATA.length)throw new Error('Нет данных');
    cur=DATA.length-1;
    renderNav();renderOpiu();
    if(sec==='report')renderReport();
    dot.className='dot live';
    const n=new Date();
    st.textContent=`${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
  }catch(e){
    dot.className='dot err';st.textContent='Ошибка';
    const eb=`<div class="errbox"><div style="font-weight:600;margin-bottom:6px">Ошибка загрузки</div><div>${e.message}</div><button class="retry" onclick="load()">Повторить</button></div>`;
    $('m-rows').innerHTML=eb;$('d-right').innerHTML=eb;
  }
}
load();
setInterval(load,5*60*1000);
</script>
</body>
</html>
