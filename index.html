<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОПиУ — Нобед Букинг</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F2; --surface: #FFFFFF; --surface2: #F0EFE9;
    --border: rgba(0,0,0,0.08); --text: #1A1A18; --text2: #6B6A65; --text3: #9E9D97;
    --green: #3B6D11; --red: #A32D2D; --blue: #185FA5; --amber: #BA7517; --accent: #D85A30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Golos Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 520px; margin: 0 auto; padding: 0 0 4rem; }

  .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.25rem 0; position: sticky; top: 0; z-index: 10; }
  .top-bar-inner { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
  .logo { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 600; }
  .logo span { color: var(--accent); }
  .sync-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background 0.3s; flex-shrink: 0; }
  .dot.live { background: #639922; }
  .dot.loading { background: var(--amber); animation: pulse 1s infinite; }
  .dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .month-nav { display: flex; overflow-x: auto; gap: 2px; padding-bottom: 0.75rem; scrollbar-width: none; }
  .month-nav::-webkit-scrollbar { display: none; }
  .month-tab { flex-shrink: 0; font-family: 'Golos Text', sans-serif; font-size: 13px; font-weight: 500; color: var(--text3); padding: 6px 14px; border-radius: 20px; cursor: pointer; border: none; background: none; transition: all 0.15s; }
  .month-tab:hover { color: var(--text2); background: var(--surface2); }
  .month-tab.active { background: var(--text); color: var(--bg); }

  .content { padding: 1.25rem; }

  .hero { background: var(--surface); border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid var(--border); }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
  .hero-month { font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 700; line-height: 1.2; }
  .hero-year { font-family: 'Unbounded', sans-serif; font-size: 13px; color: var(--amber); margin-top: 2px; }
  .hero-amount { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; text-align: right; line-height: 1.2; }
  .hero-amount.pos { color: var(--green); } .hero-amount.neg { color: var(--red); }
  .hero-amount-label { font-size: 11px; color: var(--text3); text-align: right; margin-top: 3px; }

  .mini-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mini-stat { background: var(--surface2); border-radius: 12px; padding: 10px 12px; }
  .mini-stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .mini-stat-value { font-size: 14px; font-weight: 600; }
  .mini-stat-value.pos { color: var(--green); } .mini-stat-value.neg { color: var(--red); }

  .section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin: 1.25rem 0 0.5rem; }

  .row { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-radius: 14px; padding: 12px 14px; margin-bottom: 6px; border: 1px solid var(--border); transition: border-color 0.15s; }
  .row:hover { border-color: rgba(0,0,0,0.15); }
  .row-left { display: flex; align-items: center; gap: 12px; }
  .icon { width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .row-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .row-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .row-right { text-align: right; }
  .row-amount { font-size: 15px; font-weight: 600; }
  .row-amount.pos { color: var(--green); } .row-amount.neg { color: var(--red); } .row-amount.neg-blue { color: var(--blue); }
  .row-detail { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .error-box { background: #FCEBEB; border: 1px solid rgba(163,45,45,0.2); border-radius: 14px; padding: 1.25rem; text-align: center; color: var(--red); font-size: 13px; line-height: 1.6; }
  .retry-btn { margin-top: 0.75rem; background: var(--text); color: var(--bg); border: none; border-radius: 10px; padding: 8px 18px; font-family: 'Golos Text', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }

  .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; }
  .skeleton-row { height: 64px; border-radius: 14px; margin-bottom: 6px; border: 1px solid var(--border); background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="logo">Нобед <span>Букинг</span></div>
      <div class="sync-indicator">
        <div class="dot loading" id="dot"></div>
        <span id="sync-text">Загрузка...</span>
      </div>
    </div>
    <div class="month-nav" id="month-nav"></div>
  </div>
  <div class="content" id="content">
    <div class="hero" style="padding:1.5rem">
      <div style="display:flex;justify-content:space-between;margin-bottom:1.25rem">
        <div>
          <div class="skeleton" style="width:100px;height:22px;margin-bottom:6px"></div>
          <div class="skeleton" style="width:60px;height:14px"></div>
        </div>
        <div>
          <div class="skeleton" style="width:160px;height:24px;margin-bottom:6px"></div>
          <div class="skeleton" style="width:90px;height:12px;margin-left:auto"></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="skeleton" style="height:56px;border-radius:12px"></div>
        <div class="skeleton" style="height:56px;border-radius:12px"></div>
      </div>
    </div>
    <div class="skeleton-row"></div>
    <div class="skeleton-row"></div>
    <div class="skeleton-row"></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQZwm8zj9kaBFZCw7Ite6Xz2ZcBCIp8dC_zwbXTCI65I9EOFGAQAZa8R_6SKRvfEOI6iYukZqfR34vb/pub?gid=70554802&single=true&output=csv';

const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

const ICON_BG = {
  'Концерты':'#EAF3DE','Фин.Операции':'#E6F1FB','Магазины':'#FAEEDA',
  'Расходы':'#F1EFE8','Зарплаты':'#F1EFE8','Налоги':'#FCEBEB','Дивиденды':'#E6F1FB'
};
const CAT_SUB = {
  'Концерты':'Прибыль по мероприятиям','Фин.Операции':'Управление финансами',
  'Магазины':'Прибыль по мерчендайзингу','Расходы':'Содержание бизнеса',
  'Зарплаты':'Фонд оплаты труда','Налоги':'Вся налоговая нагрузка',
  'Дивиденды':'Див. зарплата + инвестиции'
};

let allData = [], cur = 0;

function fmt(n) {
  return Math.abs(n).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₽';
}

function parseRub(s) {
  if (!s) return 0;
  // Remove all non-numeric except comma, dot, minus
  const clean = s.replace(/[^\d,.\-]/g,'').replace(',','.');
  return parseFloat(clean) || 0;
}

function parseCSV(text) {
  return text.split('\n').map(line => {
    const cols = []; let cur = '', inQ = false;
    for (const c of line) {
      if (c==='"') inQ=!inQ;
      else if (c===',' && !inQ) { cols.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    cols.push(cur.trim());
    return cols;
  });
}

function parseSheetData(rows) {
  const months = [];
  let i = 0;
  while (i < rows.length) {
    const r = rows[i];
    const monthName = (r[1]||'').trim();
    if (!MONTHS_RU.includes(monthName)) { i++; continue; }

    const year = (rows[i+1]&&rows[i+1][1]) ? rows[i+1][1].trim() : '2025';
    const profit = parseRub(r[4]);
    const incomeTotal = parseRub(rows[i+2] ? rows[i+2][1] : '');

    const income = [], expenses = [];
    let expenseTotal = 0;
    let j = i + 3;

    while (j < rows.length) {
      const cr = rows[j];
      const col1 = (cr[1]||'').trim();
      const col2 = (cr[2]||'').trim();
      const amount = parseRub(cr[6]);

      // Next month detected
      if (MONTHS_RU.includes(col1)) break;

      // Expense subtotal row
      if (!col1 && col2 && col2.includes('подитог расходной')) {
        expenseTotal = parseRub(cr[1]);
        // fallback: use first column
        if (!expenseTotal) expenseTotal = parseRub(rows[j][0]);
        j++; continue;
      }

      // Skip empty or subtotal rows
      if (!col1 || col2.includes('подитог')) { j++; continue; }

      if (col2 && amount !== 0) {
        let detail = null;
        if (col2 === 'Дивиденды') {
          const d1 = rows[j+1], d2 = rows[j+2];
          if (d1 && d1[2]) {
            const parts = [];
            if (d1[2].trim()) parts.push(d1[2].trim()+': '+fmt(parseRub(d1[3])));
            if (d2 && d2[2] && d2[2].trim()) parts.push(d2[2].trim()+': '+fmt(parseRub(d2[3])));
            detail = parts.join(' · ');
          }
        }
        const entry = { icon: col1, name: col2, amount, bg: ICON_BG[col2]||'#F1EFE8', sub: CAT_SUB[col2]||'', detail };
        if (amount > 0) income.push(entry);
        else expenses.push(entry);
      }
      j++;
    }

    // Calculate expenseTotal from expenses if not found
    if (!expenseTotal) expenseTotal = expenses.reduce((s,e) => s + Math.abs(e.amount), 0);

    months.push({ name: monthName, year, profit, incomeTotal, expenseTotal, income, expenses });
    i = j;
  }
  return months;
}

function renderNav() {
  document.getElementById('month-nav').innerHTML = allData.map((m,i) =>
    `<button class="month-tab ${i===cur?'active':''}" onclick="sel(${i})">${m.name}</button>`
  ).join('');
}

function sel(i) { cur=i; renderNav(); render(); }

function render() {
  const m = allData[cur];
  const pc = m.profit>=0?'pos':'neg', ps = m.profit>=0?'+':'−';

  let h = `<div class="hero">
    <div class="hero-top">
      <div><div class="hero-month">${m.name}</div><div class="hero-year">${m.year}</div></div>
      <div>
        <div class="hero-amount ${pc}">${ps} ${fmt(m.profit)}</div>
        <div class="hero-amount-label">чистая прибыль</div>
      </div>
    </div>
    <div class="mini-stats">
      <div class="mini-stat"><div class="mini-stat-label">Доходы</div><div class="mini-stat-value pos">+ ${fmt(m.incomeTotal)}</div></div>
      <div class="mini-stat"><div class="mini-stat-label">Расходы</div><div class="mini-stat-value neg">− ${fmt(m.expenseTotal)}</div></div>
    </div>
  </div><div class="section-title">Доходы</div>`;

  m.income.forEach(c => {
    h += `<div class="row"><div class="row-left"><div class="icon" style="background:${c.bg}">${c.icon}</div><div><div class="row-title">${c.name}</div><div class="row-sub">${c.sub}</div></div></div><div class="row-right"><div class="row-amount pos">+ ${fmt(c.amount)}</div></div></div>`;
  });

  h += `<div class="section-title">Расходы</div>`;
  m.expenses.forEach(c => {
    const cl = c.name==='Дивиденды'?'neg-blue':'neg';
    h += `<div class="row"><div class="row-left"><div class="icon" style="background:${c.bg}">${c.icon}</div><div><div class="row-title">${c.name}</div><div class="row-sub">${c.sub}</div></div></div><div class="row-right"><div class="row-amount ${cl}">− ${fmt(Math.abs(c.amount))}</div>${c.detail?`<div class="row-detail">${c.detail}</div>`:''}</div></div>`;
  });

  document.getElementById('content').innerHTML = h;
}

async function loadData() {
  const dot = document.getElementById('dot');
  const syncText = document.getElementById('sync-text');
  dot.className = 'dot loading';
  syncText.textContent = 'Загрузка...';

  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    const text = await resp.text();
    const rows = parseCSV(text);
    allData = parseSheetData(rows);
    if (!allData.length) throw new Error('Нет данных');

    cur = allData.length - 1;
    renderNav();
    render();

    dot.className = 'dot live';
    const now = new Date();
    syncText.textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  } catch(e) {
    dot.className = 'dot error';
    syncText.textContent = 'Ошибка';
    document.getElementById('content').innerHTML = `
      <div class="error-box">
        <div style="font-weight:600;margin-bottom:6px">Не удалось загрузить данные</div>
        <div>${e.message}</div>
        <button class="retry-btn" onclick="loadData()">Попробовать снова</button>
      </div>`;
  }
}

loadData();
// Автообновление каждые 5 минут
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
